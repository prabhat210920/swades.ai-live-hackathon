name: app
description: "QuickSlot — Sports Slot Booking App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Navigation
  go_router: ^14.6.2

  # Date/time formatting
  intl: ^0.19.0

  # Shimmer loading effect
  shimmer: ^3.0.0

  # Cached images
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
