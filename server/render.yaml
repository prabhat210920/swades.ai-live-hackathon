# render.yaml — Infrastructure as Code for Render
# Commit this file to your repo root so Render can auto-configure the service.
# Docs: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: quickslot-api
    runtime: python
    region: singapore           # change to: oregon, frankfurt, ohio, virginia
    plan: free                  # upgrade to starter ($7/mo) for always-on

    # Working directory (relative to repo root)
    # If your repo root IS the server folder, use rootDir: .
    # If server/ is a subdirectory of the repo, use:
    rootDir: server

    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"

    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value

      - key: DEBUG
        value: "False"

      - key: ALLOWED_HOSTS
        # Render sets RENDER_EXTERNAL_HOSTNAME automatically; add your custom domain too
        value: ".onrender.com,localhost,127.0.0.1"

      - key: DATABASE_URL
        fromDatabase:
          name: quickslot-db         # must match the database name below
          property: connectionString

      - key: PYTHON_VERSION
        value: "3.12.0"

    healthCheckPath: /api/schema/    # Render hits this to confirm the service is up

  # ---------------------------------------------------------------------------
  # Managed PostgreSQL database
  # ---------------------------------------------------------------------------
databases:
  - name: quickslot-db
    databaseName: quickslot
    user: quickslot_user
    region: singapore               # keep same region as the web service
    plan: free                      # free tier: 1 GB, expires after 90 days
